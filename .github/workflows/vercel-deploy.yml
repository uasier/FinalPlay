name: Deploy to Vercel

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: vercel-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: read

    env:
      VERCEL_ENV: ${{ github.event_name == 'push' && 'production' || 'preview' }}
      VERCEL_FLAGS: ${{ github.event_name == 'push' && '--prod' || '' }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm install --no-audit --no-fund

      - name: Build
        run: npm run build

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel config
        run: vercel pull --yes --environment=$VERCEL_ENV --token=${{ secrets.VERCEL_TOKEN }}

      - name: Vercel build
        run: vercel build $VERCEL_FLAGS --token=${{ secrets.VERCEL_TOKEN }}

      - name: Vercel deploy
        id: vercel_deploy
        run: |
          url="$(vercel deploy --prebuilt $VERCEL_FLAGS --token=${{ secrets.VERCEL_TOKEN }})"
          echo "url=$url" >> "$GITHUB_OUTPUT"
          echo "Deployed: $url"
